[workspace]
members = ["run-wasm"]

[package]
name = "softcard"
version = "0.1.0"
edition = "2024"

[dependencies]
console_log = "1.0.0"
fastrand = "2.3.0"
log = "0.4.29"
simple_logger = { version = "5.2.0", default-features = false }
softbuffer = "0.4.8"
vello_cpu = { version = "0.0.7", default-features = false, features = ["libm", "text", "u8_pipeline"] }
web-time = "1.1.0"
winit = "0.30.13"

[profile.dev]
opt-level = 2

[profile.release]
strip = "debuginfo"
codegen-units = 1
lto = true
panic = "abort"
