[workspace]
members = ["run-wasm"]

[package]
name = "softcard"
version = "0.1.0"
edition = "2024"

[dependencies]
console_log = "1.0.0"
fastrand = "2.3.0"
iced = { version = "0.13.1", features = ["canvas", "webgl"] }
log = "0.4.29"
simple_logger = { version = "5.2.0", default-features = false }

[profile.dev]
opt-level = 2

[profile.release]
strip = "debuginfo"
codegen-units = 1
lto = true
panic = "abort"
