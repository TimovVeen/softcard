[workspace]
members = ["run-wasm"]

[package]
name = "softcard"
version = "0.2.0"
rust-version = "1.95"
edition = "2024"

[dependencies]
iced = { git = "https://github.com/iced-rs/iced.git", version = "0.15.0-dev", default-features = false, features = ["tiny-skia", "crisp", "web-colors", "thread-pool", "linux-theme-detection", "x11", "wayland", "canvas", "fira-sans"] }
fastrand = "2.4.1"
web-time = "1.1.0"
log = "0.4.32"
simple_logger = { version = "5.2.0", default-features = false }
console_log = "1.0.0"

[profile.dev]
opt-level = 2

[profile.release]
strip = "debuginfo"
codegen-units = 1
lto = true
